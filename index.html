<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>EasyPoint V1.0</title>
	<link rel="stylesheet" href="w3.css" />
	<link rel="stylesheet" href="style.css" />
	<script src="blocks.js"></script>
	<script src="script.js" defer></script>
</head>

<body class="w3-container">

	<h1>EasyPoint V1.0</h1>



	<h2>Desglose de Entradas/Salidas</h2>
	<div style="margin-bottom:64px;" id="divEstudio"></div>

	<div class="w3-margin-bottom-large" style="display: flex; gap: 8px;">
		<button class="w3-margin-left w3-button w3-green w3-small"  onclick="addBlock()">+</button>
		<select id="blockSelect" class="w3-select w3-border" style="width: 400px; padding-left:16px;"></select>
	</div>

	<div class="w3-margin-bottom">
		<table class="w3-table w3-bordered" id="summary-table">
			<thead>
				<tr>
					<th><button></button><input value="TOTAL"/><input value="4"/></th>
					<th>EA</th>
					<th>ED</th>
					<th>SA</th>
					<th>SD</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td></td>
					<td>-</td>
					<td>-</td>
					<td>-</td>
					<td>-</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="w3-container w3-margin-bottom">
		<button class="w3-button w3-blue" onclick="generateCSV()">Generar CSV</button>
	</div>

</body>

</html>
