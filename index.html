<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>EasyPoint V1.0</title>
	<link rel="stylesheet" href="w3.css" />

	<script src="blocks.js"></script>

</head>

<body class="w3-container">

	<h1>EasyPoint V1.0</h1>

	<div class="w3-margin-bottom" style="display: flex; gap: 8px;">
		<select class="w3-select w3-border" style="width: 400px; padding-left:16px;" id="blockSelect"></select>
		<button class="w3-button w3-green" onclick="addBlock()">Añadir</button>
		<button class="w3-button w3-blue" onclick="generateCSV()">Generar CSV</button>
	</div>

	<div class="w3-margin-bottom" style="display: none; gap: 8px;" id="divEstudio">
		<!-- <h2>Desglose de Entradas/Salidas</h2> -->
		<!-- tablas de bloques -->
	</div>	

	<div class="w3-margin-bottom" style="display: none; gap: 8px;" id="divSummario">
		<table class="w3-table w3-bordered">
			<thead>
				<tr></tr>
			</thead>	
			<tbody>
				<tr style="font-weight: bold;"></tr>
			</tbody>	
		</table>	
	</div><br>	

</body>

</html>
